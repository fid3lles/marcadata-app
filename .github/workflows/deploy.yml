name: Deploy to GitHub Pages

on:
  # Publica a cada push na branch principal.
  push:
    branches: [main]
  # Permite disparar manualmente pela aba Actions.
  workflow_dispatch:

# Permissões necessárias para o deploy via GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Garante apenas um deploy por vez, sem cancelar um deploy em andamento.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Habilita o MSW no build publicado para a demo funcionar sem backend.
          VITE_ENABLE_MOCKS: "true"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
